apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: presentazione-app
  namespace: argocd
spec:
  project: platform-demo
  source:
    repoURL: https://github.com/Miky186/argocd-demo.git
    targetRevision: main
    path: apps/demo
  destination:
    server: https://kubernetes.default.svc
    namespace: prod-demo
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
